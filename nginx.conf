# ZapFlow - Nginx Configuration
# Handles HTTPS termination, WebSocket proxying, and static assets

worker_processes auto;
events { worker_connections 1024; }

http {
  # ─── UPSTREAM ──────────────────────────────────────────────────────────────
  upstream zapflow {
    server app:3000;
    keepalive 64;
  }

  # ─── HTTP → HTTPS REDIRECT ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ─── HTTPS ─────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name your-domain.com;  # Change to your domain

    # SSL certificates (use Certbot/Let's Encrypt)
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 16M;  # Match WhatsApp max file size

    # ─── WEBSOCKET ────────────────────────────────────────────────────────────
    location /api/socket {
      proxy_pass http://zapflow;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400;  # 24h for long-running WebSocket connections
      proxy_send_timeout 86400;
    }

    # ─── STATIC FILES (Next.js) ───────────────────────────────────────────────
    location /_next/static {
      proxy_pass http://zapflow;
      proxy_cache_valid 200 1y;
      add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # ─── UPLOADS ──────────────────────────────────────────────────────────────
    location /uploads {
      proxy_pass http://zapflow;
      add_header Cache-Control "public, max-age=86400";
    }

    # ─── ALL OTHER ROUTES ─────────────────────────────────────────────────────
    location / {
      proxy_pass http://zapflow;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
    }
  }
}

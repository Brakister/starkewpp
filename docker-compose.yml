# ZapFlow - Docker Compose (Production)
version: '3.8'

services:
  # ─── APP ────────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zapflow-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET}
      - WHATSAPP_WEBHOOK_VERIFY_TOKEN=${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads
    networks:
      - zapflow-net

  # ─── DATABASE ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: zapflow-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-zapflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-zapflow123}
      - POSTGRES_DB=${POSTGRES_DB:-zapflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zapflow}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - zapflow-net

  # ─── NGINX REVERSE PROXY ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: zapflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - zapflow-net

volumes:
  pgdata:
  uploads:

networks:
  zapflow-net:
    driver: bridge
